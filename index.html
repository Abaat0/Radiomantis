<!DOCTYPE html>
<html lang="en"> <head>
    <meta charset="utf-8">
    <title>Radiomantis</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="css/pictures/logov2.webp"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Castoro&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

<body>
    <img src="css/pictures/plant-background.webp" id="plant" alt="" aria-hidden="true">
    <div id="app-frame">
        
        <main id="home-view">
            
            <div id="brand-logo">
                <img src="css/pictures/logofinal.avif" alt="Radiomantis Logo" class="responsive-img">
            </div>

            <section id="info-box">
                
                <div id="player-container">
                    <div class="player-top-row">
                       <button id="play-pause-btn" class="icon-button" aria-label="Play/Pause"></button>
                        <div class="now-playing-label"><p>now playing</p></div>
                    </div>
                    <div class="player-text">
                        <p id="main-player-text">the sangwich show w/ botond</p>
                    </div>
                </div>

                <div id="upcoming-container">
                    <div class="upcoming-header"><p>up next:</p></div>
                    <div class="upcoming-item">
                        <p class="upcoming-title">leather music w/ swagbert</p>
                    </div>
                </div>

            </section>

        </main>

        <nav id="main-menu">
            <a href="index.html" class="nav-link">home</a>
            <a href="schedule.html" class="nav-link wip-link">schedule</a>
            <a href="residents.html" class="nav-link wip-link">residents</a>
            <a href="past-shows.html" class="nav-link wip-link">past shows</a>
            <a href="about.html" class="nav-link wip-link">about us</a>
            <a href="donate.html" class="nav-link wip-link">donate</a>
        </nav>

    </div>

    <audio id="radio-stream" src="https://radiomantis.com/listen/radiomantis/radio.mp3" preload="none"></audio>
    <script src="javascript/script.js"></script> </body>
</html>
