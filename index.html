<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <title>Radiomantis</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="css/pictures/logo.png"/>
</head>
<body>
    <script src="/javascript/script.js"></script>
    <div class="frame">
        <div class="infobox">
            <div class="logobox"></div>
            <div class="picturebox"></div>
            <div class="playerbox">
                <div class="player">
                    <button class="button" aria-label="Play/Pause"></button>

                    <div class="playertext"></div>
                </div>
                <div class="showtitlebox">

                </div>
                <div class="timebox"></div>
            </div>
            <div class="upcommingbox"></div>

        </div>
        <div class="tvbox">
            <div class="tvframe">
                <div class="vinylbox"></div>
                <div class="insidetvbox"></div>
            </div>
            <div class="menu">
                <div class="about_usbox"><p>ABOUT US</p></div>
                <div class="residentsbox">RESIDENTS</div>
                <div class="schedulebox"><p>SCHEDULE</p></div>
                <div class="donatebox"><p>Donate</p></div>

            </div>
        </div>
    
    </div>
</body>
