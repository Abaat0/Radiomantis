<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <title>Radiomantis</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="css/pictures/logo.png"/>
    <link rel="stylesheet" type="text/css" href="//fonts.googleapis.com/css?family=Abel" />
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <script src="/javascript/script.js"></script>
    <div class="frame">
        <div class="infobox">
            <div class="logobox"></div>
            <div class="picturebox"></div>
            <div class="playerbox">
                <div class="player-top-row">
                    <button class="button" aria-label="Play/Pause"></button>
                    <div class="nowplaying"><p>now playing</p></div>
                </div>

                <div class="playertext">
                    <p>the sangwich show w/ botond</p>
                </div>

                <div class="currentshowtime">
                    <p>12:00 - 14:00</p>
                </div>
            </div>

            <div class="upcommingbox">
                <div class="upnexttitle"><p>up next:</p></div>
                <div class="upcommingitem">
                    <div class="upcommingtitle"><p>leather music w/ swagbert</p></div>
                    <div class="upcomingtime"><p>16:00 - 18:00</p></div>
                </div>
                <div class="upcommingitem"></div>

            </div>

        </div>
        <div class="tvbox">
            <div class="tvframe">
                <div class="vinylbox"></div>
                <div class="insidetvbox">
                    <div class="tvtext"><span class="dot"></span><p>LIVE NOW</p></div>
                    <div class="playertext">
                    <p>the sangwich show w/ botond</p>
                </div>
                </div>
            </div>
            <div class="menu">
                <div class="about_usbox"><p>ABOUT US</p></div>
                <div class="residentsbox">RESIDENTS</div>
                <div class="schedulebox"><p>SCHEDULE</p></div>
                <a  target="_blank" rel="noopener noreferrer" href="https://buymeacoffee.com/radiomantis"><div class="donatebox"><p>DONATE</p></div></a>
                

            </div>
        </div>
    
    </div>
    <audio id="radio-stream" src="https://radiomantis.com/listen/radiomantis/radio.mp3" preload="none"></audio>
</body>
